name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: Build, Test, and Pack Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Ensure rolldown Linux native binding
        if: runner.os == 'Linux'
        shell: bash
        run: |
          node -e "require.resolve('@rolldown/binding-linux-x64-gnu')" || npm i --no-save @rolldown/binding-linux-x64-gnu

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Package check
        run: npm run pack:check --if-present
