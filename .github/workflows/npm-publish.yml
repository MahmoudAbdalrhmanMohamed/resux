name: Publish to npm

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    concurrency:
      group: npm-publish-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          registry-url: "https://registry.npmjs.org/"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@^11.5.1

      - name: Install dependencies
        run: npm install --include=optional

      - name: Install Linux Rolldown binding
        run: npm install --no-save --package-lock=false @rolldown/binding-linux-x64-gnu@1.0.0-rc.17

      - name: Check package
        run: npm run pack:check

      - name: Check npm version
        id: npm-version
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is not published yet."
          fi

      - name: Check NPM token availability
        id: npm-token
        shell: bash
        run: |
          if [ -n "${{ secrets.NPM_TOKEN }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package (OIDC)
        id: publish-oidc
        if: steps.npm-version.outputs.published == 'false'
        continue-on-error: true
        run: npm publish --access public --provenance

      - name: Publish package (NPM_TOKEN fallback)
        if: steps.npm-version.outputs.published == 'false' && steps.publish-oidc.outcome == 'failure' && steps.npm-token.outputs.available == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Fail with publish setup guidance
        if: steps.npm-version.outputs.published == 'false' && steps.publish-oidc.outcome == 'failure' && steps.npm-token.outputs.available != 'true'
        shell: bash
        run: |
          echo "Publish failed with OIDC and NPM_TOKEN is not set."
          echo "Configure npm trusted publisher for .github/workflows/npm-publish.yml or add repository secret NPM_TOKEN."
          exit 1
