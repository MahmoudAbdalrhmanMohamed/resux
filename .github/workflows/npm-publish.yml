name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish npm Package
    runs-on: ubuntu-latest
    concurrency:
      group: npm-publish-${{ github.event.release.tag_name || github.ref_name }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          registry-url: "https://registry.npmjs.org/"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate release tag
        id: release
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          RELEASE_TAG="${GITHUB_REF_NAME}"

          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            RELEASE_TAG="${{ github.event.release.tag_name }}"
          fi

          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag ${RELEASE_TAG} is not a semver tag like v1.0.0."
            exit 1
          fi

          if [ "${RELEASE_TAG}" != "v${PACKAGE_VERSION}" ]; then
            echo "Release tag ${RELEASE_TAG} does not match package version ${PACKAGE_VERSION}."
            exit 1
          fi

          echo "package-name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "package-version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check package
        run: npm run pack:check

      - name: Check npm version
        id: npm-version
        shell: bash
        run: |
          if npm view "${{ steps.release.outputs.package-name }}@${{ steps.release.outputs.package-version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "${{ steps.release.outputs.package-name }}@${{ steps.release.outputs.package-version }} is already published."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "${{ steps.release.outputs.package-name }}@${{ steps.release.outputs.package-version }} is not published yet."
          fi

      - name: Publish package
        if: steps.npm-version.outputs.published == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "NPM_TOKEN is required to publish."
            exit 1
          fi

          npm publish --access public --provenance
