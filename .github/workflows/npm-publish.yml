name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  release:
    types: [published]
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Semver tag to publish (for example: v1.2.3). Leave empty to auto-detect."
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event_name == 'release' ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push')
    name: Publish npm package
    runs-on: ubuntu-latest
    concurrency:
      group: npm-publish-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.event_name == 'release' && github.event.release.tag_name || github.ref_name || github.run_id }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Debug release context
        shell: bash
        run: |
          echo "event_name=${GITHUB_EVENT_NAME}"
          echo "ref=${GITHUB_REF}"
          echo "ref_name=${GITHUB_REF_NAME}"
          echo "sha=${GITHUB_SHA}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            echo "workflow_run.event=${{ github.event.workflow_run.event }}"
            echo "workflow_run.conclusion=${{ github.event.workflow_run.conclusion }}"
            echo "workflow_run.head_sha=${{ github.event.workflow_run.head_sha }}"
          fi

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          registry-url: "https://registry.npmjs.org/"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Ensure rolldown Linux native binding
        if: runner.os == 'Linux'
        shell: bash
        run: |
          node -e "require.resolve('@rolldown/binding-linux-x64-gnu')" || npm i --no-save @rolldown/binding-linux-x64-gnu

      - name: Validate package metadata
        shell: bash
        run: |
          node -e "
          const pkg = require('./package.json');
          if (pkg.private === true) throw new Error('package.json has private:true; cannot publish');
          if (pkg.name !== 'resuxjs') throw new Error('Expected package name to be resuxjs, got ' + pkg.name);
          "

      - name: Resolve and validate release tag
        id: release
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TARGET_SHA="${GITHUB_SHA}"
          RELEASE_TAG=""

          if [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            TARGET_SHA="${{ github.event.workflow_run.head_sha }}"
          fi
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            RELEASE_TAG="${{ github.event.release.tag_name }}"
          fi

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ inputs.release_tag }}"
          fi

          if [ -z "${RELEASE_TAG}" ]; then
            RELEASE_TAG="$(git tag --points-at "${TARGET_SHA}" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$' | head -n 1 || true)"
          fi

          if [ -z "${RELEASE_TAG}" ]; then
            if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
              echo "Could not resolve a semver release tag. Provide workflow_dispatch input 'release_tag' (for example v1.2.3)."
              exit 1
            fi
            if [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
              echo "No semver release tag found on ${TARGET_SHA}; skipping publish for non-tag CI run."
              echo "should-publish=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Could not resolve release tag from event ${GITHUB_EVENT_NAME}."
            exit 1
          fi

          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag ${RELEASE_TAG} is not a semver tag like v1.0.0."
            exit 1
          fi

          if [ "${RELEASE_TAG}" != "v${PACKAGE_VERSION}" ]; then
            echo "Release tag ${RELEASE_TAG} does not match package version ${PACKAGE_VERSION}."
            exit 1
          fi

          echo "Resolved release tag: ${RELEASE_TAG}"
          echo "should-publish=true" >> "$GITHUB_OUTPUT"
          echo "release-tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "package-name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "package-version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Run typecheck if available
        if: steps.release.outputs.should-publish == 'true'
        run: npm run typecheck --if-present

      - name: Build
        if: steps.release.outputs.should-publish == 'true'
        run: npm run build

      - name: Run tests if available
        if: steps.release.outputs.should-publish == 'true'
        run: npm test --if-present

      - name: Check package files
        if: steps.release.outputs.should-publish == 'true'
        run: npm pack --dry-run

      - name: Check npm version
        if: steps.release.outputs.should-publish == 'true'
        id: npm-version
        shell: bash
        run: |
          if npm view "${{ steps.release.outputs.package-name }}@${{ steps.release.outputs.package-version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "${{ steps.release.outputs.package-name }}@${{ steps.release.outputs.package-version }} is already published."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "${{ steps.release.outputs.package-name }}@${{ steps.release.outputs.package-version }} is not published yet."
          fi

      - name: Publish package
        if: steps.release.outputs.should-publish == 'true' && steps.npm-version.outputs.published == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "NPM_TOKEN is required to publish."
            exit 1
          fi

          set +e
          npm publish --provenance --access public
          STATUS=$?
          set -e

          if [ "${STATUS}" -ne 0 ]; then
            echo "Provenance publish failed, retrying without provenance."
            npm publish --access public
          fi
